<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila Oficina Bravo</title>

<style>
*{ box-sizing: border-box; }
body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f3f4f6;
    margin: 0;
    padding: 20px;
    color: #1f2937;
}
.container{
    max-width: 900px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
h2{ text-align: center; margin-top: 0; font-size: 24px; color: #111827; }
.btn-voltar{
    width: 100%; padding: 12px; background: #4b5563; color: white; border: none;
    border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; margin-bottom: 20px;
}
.btn-voltar:hover{ background: #374151; }
.form-group{ margin-bottom: 15px; }
label{ display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; color: #4b5563; }
input, select{
    width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 15px; background-color: #fff; color: #1f2937; transition: border-color 0.15s;
}
input:focus, select:focus{ border-color: #3b82f6; outline: none; }
.btn-primary{
    width: 100%; padding: 12px; background: #2563eb; color: white; border: none;
    border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; margin-top: 10px;
}
.btn-primary:hover{ background: #1d4ed8; }
.servico-row{ display: flex; gap: 10px; margin-bottom: 10px; }
.grid-2{ display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.card-os{
    background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 15px;
    margin-top: 15px; position: relative; border-left: 5px solid #2563eb;
}
.card-os.concluido { border-left-color: #10b981; background: #f0fdf4; }
.badge{
    position: absolute; top: 15px; right: 15px; padding: 4px 8px;
    border-radius: 12px; font-size: 12px; font-weight: 600;
}
.badge.pendente { background: #fef3c7; color: #d97706; }
.badge.concluido { background: #d1fae5; color: #065f46; }
.os-title{ font-size: 18px; font-weight: 600; margin: 0 0 10px 0; color: #111827; }
.os-details p{ margin: 4px 0; font-size: 14px; color: #4b5563; }
.os-acoes{ display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn-acao{
    padding: 6px 12px; border: none; border-radius: 6px; font-size: 13px;
    font-weight: 500; cursor: pointer;
}
.btn-concluir { background: #10b981; color: white; }
.btn-imprimir { background: #3b82f6; color: white; }
.btn-excluir { background: #ef4444; color: white; }
.loading { text-align: center; font-style: italic; color: #6b7280; padding: 20px; }
</style>
</head>
<body>

<div class="container">
    <button class="btn-voltar" onclick="window.location.href='index.html'">⬅️ Voltar ao Dashboard</button>
    
    <h2>🛠️ Abertura de Ordem de Serviço (Nuvem)</h2>
    
    <div class="grid-2">
        <div class="form-group">
            <label>Cliente</label>
            <input id="cliente" placeholder="Nome do cliente">
        </div>
        <div class="form-group">
            <label>Mecânico Responsável</label>
            <select id="responsavel">
                <option value="">Selecione...</option>
                <option value="Mecânico 1">Mecânico 1</option>
                <option value="Mecânico 2">Mecânico 2</option>
            </select>
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Moto</label>
            <input id="moto" placeholder="Ex: Honda">
        </div>
        <div class="form-group">
            <label>Modelo/Ano</label>
            <input id="modelo" placeholder="Ex: CG Titan 160">
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>KM</label>
            <input id="km" placeholder="Ex: 25000">
        </div>
        <div class="form-group">
            <label>Valor Total dos Serviços (R$)</label>
            <input id="valor" type="number" step="0.01" placeholder="0.00">
        </div>
    </div>

    <div class="form-group">
        <label>Descrição dos Serviços / Peças</label>
        <input id="servicos" placeholder="Ex: Troca de óleo, Pastilha de freio...">
    </div>

    <button class="btn-primary" onclick="criarOS()">⚡ Abrir Ordem de Serviço</button>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #e5e7eb;">

    <h2>📋 Ordens de Serviço Ativas</h2>
    <div id="listaOS">
        <p class="loading">Buscando registros na nuvem...</p>
    </div>
</div>

<script>
const API_URL = "https://sheetdb.io/api/v1/550s3xju33qqi?sheet=fila";
let dadosOS = [];

function carregarOS() {
    document.getElementById("listaOS").innerHTML = '<p class="loading">Atualizando ordens...</p>';
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            dadosOS = data.map(item => ({
                cliente: item.cliente || "",
                moto: item.moto || "",
                modelo: item.modelo || "",
                km: item.km || "",
                responsavel: item.responsavel || "",
                valor: parseFloat(item.valor) || 0,
                data: item.data || "",
                status: item.status || "Pendente",
                servicos: item.servicos || "",
                id: item.id || ""
            }));
            listarOS();
        })
        .catch(err => {
            console.error(err);
            document.getElementById("listaOS").innerHTML = '<p class="loading" style="color:red;">Erro ao buscar dados na nuvem.</p>';
        });
}

function listarOS() {
    let html = "";
    dadosOS.forEach((os, index) => {
        const statusClass = os.status === "Concluído" ? "concluido" : "pendente";
        html += `
        <div class="card-os ${statusClass}">
            <span class="badge ${statusClass}">${os.status}</span>
            <h3 class="os-title">🏍️ ${os.moto} ${os.modelo}</h3>
            <div class="os-details">
                <p><b>Cliente:</b> ${os.cliente}</p>
                <p><b>Mecânico:</b> ${os.responsavel || "Não atribuído"}</p>
                <p><b>KM:</b> ${os.km || "-"}</p>
                <p><b>Serviços:</b> ${os.servicos}</p>
                <p><b>Valor:</b> R$ ${os.valor.toFixed(2)}</p>
                <p><small>📅 ${os.data}</small></p>
            </div>
            <div class="os-acoes">
                ${os.status === "Pendente" ? `<button class="btn-acao btn-concluir" onclick="concluirOS('${os.id}')">✅ Concluir</button>` : ''}
                <button class="btn-acao btn-imprimir" onclick="imprimirOS(${index})">🖨️ Ver OS</button>
                <button class="btn-acao btn-excluir" onclick="excluirOS('${os.id}')">❌ Remover</button>
            </div>
        </div>`;
    });
    document.getElementById("listaOS").innerHTML = html || "<p class='loading'>Nenhuma ordem de serviço na fila.</p>";
}

function criarOS() {
    const cliente = document.getElementById("cliente").value.trim();
    const responsavel = document.getElementById("responsavel").value;
    const moto = document.getElementById("moto").value.trim();
    const modelo = document.getElementById("modelo").value.trim();
    const km = document.getElementById("km").value.trim();
    const valor = parseFloat(document.getElementById("valor").value) || 0;
    const servicos = document.getElementById("servicos").value.trim();

    if(!cliente || !moto) {
        alert("Preencha ao menos o nome do Cliente e a Moto.");
        return;
    }

    const novaOS = {
        cliente, responsavel, moto, modelo, km, valor,
        data: new Date().toLocaleString("pt-BR"),
        status: "Pendente",
        servicos,
        id: "os_" + Date.now()
    };

    fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: [novaOS] })
    })
    .then(res => res.json())
    .then(() => {
        alert("OS criada com sucesso na nuvem!");
        limparFormulario();
        carregarOS();
    })
    .catch(err => alert("Erro ao criar OS: " + err));
}

function concluirOS(id) {
    document.getElementById("listaOS").innerHTML = '<p class="loading">Atualizando status...</p>';
    fetch(`${API_URL}&id=${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: "Concluído" })
    })
    .then(() => carregarOS())
    .catch(err => alert("Erro ao concluir: " + err));
}

function excluirOS(id) {
    if(confirm("Deseja apagar definitivamente esta OS?")) {
        document.getElementById("listaOS").innerHTML = '<p class="loading">Removendo...</p>';
        fetch(`${API_URL}&id=${id}`, { method: 'DELETE' })
            .then(() => carregarOS())
            .catch(err => alert("Erro ao remover: " + err));
    }
}

function imprimirOS(index) {
    const os = dadosOS[index];
    let janela = window.open('', '_blank');
    janela.document.write(`
        <html><head><title>Ordem de Serviço</title></head>
        <body style="font-family:Arial; padding:20px; line-height:1.6;">
            <h2>OFICINA BRAVO - COMPROVANTE DE OS</h2>
            <hr>
            <p><b>Data:</b> ${os.data}</p>
            <p><b>Cliente:</b> ${os.cliente}</p>
            <p><b>Veículo:</b> ${os.moto} - ${os.modelo} (KM: ${os.km || "-"})</p>
            <p><b>Mecânico Responsável:</b> ${os.responsavel || "-"}</p>
            <p><b>Serviços executados:</b> ${os.servicos}</p>
            <h3>Total: R$ ${os.valor.toFixed(2)}</h3>
            <hr>
            <center><p>Obrigado pela preferência!</p></center>
            <script>window.print();<\/script>
        </body></html>
    `);
    janela.document.close();
}

function limparFormulario() {
    document.getElementById("cliente").value = "";
    document.getElementById("moto").value = "";
    document.getElementById("modelo").value = "";
    document.getElementById("km").value = "";
    document.getElementById("valor").value = "";
    document.getElementById("servicos").value = "";
    document.getElementById("responsavel").value = "";
}

carregarOS();
</script>
</body>
</html>
