<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:Arial}
header{padding:15px;background:#151515;text-align:center;font-weight:bold}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:240px;background:#151515;overflow-y:auto;padding:10px}
.content{flex:1;padding:15px;overflow-y:auto}
.item{background:#222;padding:10px;margin-bottom:8px;border-radius:8px;cursor:pointer}
.item:hover,.active{background:#00c853}
select{width:100%;padding:10px;background:#222;color:#fff;border:none;border-radius:8px;margin-bottom:10px}
.card{background:#1a1a1a;padding:12px;border-radius:12px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.valor{font-size:22px;font-weight:bold}
.voltar {
    background: #222;
    color: white;
    border: 1px solid #333;
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    margin: 10px;
}
</style>
</head>
<body>

<header>📊 Relatório Financeiro Completo</header>
<button class="voltar" onclick="history.back()">⬅️ Voltar</button>

<div class="container">

<div class="sidebar">
<h3>👥 Funcionários</h3>
<div id="usuarios"></div>
</div>

<div class="content">

<div class="card">
<h3>🏢 Balanço Geral da Empresa</h3>
<div id="geralGanhos">💰 Ganhos: R$ 0,00</div>
<div id="geralGastos">🧾 Gastos: R$ 0,00</div>
<div id="geralTaxa">📉 Taxa: R$ 0,00</div>
<div id="geralSaldo">💵 Saldo: R$ 0,00</div>
</div>

<div class="card">
<h3>📅 Selecione o mês</h3>
<select id="mesSelect" onchange="atualizar()"></select>
<select id="tipoGrafico" onchange="atualizar()">
<option value="line">📈 Linha</option>
<option value="bar">📊 Barras</option>
<option value="doughnut">🍩 Pizza</option>
</select>
<button onclick="window.print()">🖨️ Imprimir Relatório</button>
<button onclick="enviarWhatsapp()">📲 Enviar WhatsApp</button>
</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="grid">
<div class="card"><div>💰 Ganhos</div><div id="ganhos" class="valor">R$ 0</div></div>
<div class="card"><div>🧾 Gastos</div><div id="gastos" class="valor">R$ 0</div></div>
<div class="card"><div>📉 Taxa 20%</div><div id="taxa" class="valor">R$ 0</div></div>
<div class="card"><div>💵 Saldo</div><div id="saldo" class="valor">R$ 0</div></div>
</div>

<div class="card">
<h3>🏆 Ranking de Funcionários</h3>
<div id="ranking"></div>
</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {};
let phones = JSON.parse(localStorage.getItem("phones")) || {}; // Carrega a lista de telefones correta
let taxaSistema = Number(localStorage.getItem("taxa")) || 20;
let chart;
let usuarioAtual = null;

function mesesDisponiveis(){
 const meses = new Set();
 Object.values(data).forEach(lista=>{
   lista.forEach(l=>{
      const d = new Date(l.data);
      meses.add(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));
   });
 });
 return [...meses].sort().reverse();
}

function carregarMeses(){
 const select=document.getElementById("mesSelect");
 select.innerHTML="";
 mesesDisponiveis().forEach(m=>{
   const op=document.createElement("option");
   op.value=m;
   op.text=m;
   select.appendChild(op);
 });
}

function carregarUsuarios(){
 const box=document.getElementById("usuarios");
 box.innerHTML="";
 Object.keys(data).forEach(nome=>{
   const div=document.createElement("div");
   div.className="item";
   div.innerText=nome;
   div.onclick=()=>{
      usuarioAtual=nome;
      document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"));
      div.classList.add("active");
      atualizar();
   };
   box.appendChild(div);
 });
}

function calcularGeral(){
let ganhos=0,gastos=0;
Object.values(data).forEach(lista=>{
 lista.forEach(item=>{
  if(item.tipo==="vale") gastos+=Number(item.valor||0);
  else ganhos+=Number(item.valor||0);
 });
});
let taxa=ganhos*(taxaSistema/100);
let saldo=ganhos-gastos-taxa;
document.getElementById("geralGanhos").innerHTML=`💰 Ganhos: R$ ${ganhos.toFixed(2)}`;
document.getElementById("geralGastos").innerHTML=`🧾 Gastos: R$ ${gastos.toFixed(2)}`;
document.getElementById("geralTaxa").innerHTML=`📉 Taxa: R$ ${taxa.toFixed(2)}`;
document.getElementById("geralSaldo").innerHTML=`💵 Saldo: R$ ${saldo.toFixed(2)}`;
}

function gerarRanking(){
let ranking=[];
Object.keys(data).forEach(nome=>{
 let total=0;
 (data[nome]||[]).forEach(item=>{
  if(item.tipo!=="vale") total+=Number(item.valor||0);
 });
 ranking.push({nome,total});
});
ranking.sort((a,b)=>b.total-a.total);
document.getElementById("ranking").innerHTML=ranking.map((r,i)=>`${i+1}º 🏆 ${r.nome} - R$ ${r.total.toFixed(2)}`).join("<br>");
}

function enviarWhatsapp(){
 if(!usuarioAtual) return;
 
 // Busca o telefone diretamente do banco de dados de telefones usando o nome do mecânico atual
 let fone = phones[usuarioAtual]; 
 
 if(!fone){ alert("Telefone não cadastrado para este mecânico."); return; }
 
 const mes=document.getElementById("mesSelect").value;
 let msg=`📊 *RELATÓRIO FINANCEIRO (${mes})*\n\n` +
         `👤 *Funcionário:* ${usuarioAtual}\n` +
         `💰 *Ganhos Brutos:* ${document.getElementById("ganhos").innerText}\n` +
         `🧾 *Gastos/Vales:* ${document.getElementById("gastos").innerText}\n` +
         `📉 *Taxa Retenção (${taxaSistema}%):* ${document.getElementById("taxa").innerText}\n` +
         `----------------------------------------\n` +
         `💵 *Saldo Líquido:* ${document.getElementById("saldo").innerText}`;
         
 let numero=fone.replace(/\D/g,'');
 
 // Se o número digitado não tiver o código internacional 55 (Brasil) na frente, adicione automaticamente
 if (numero.length <= 11) {
     numero = "55" + numero;
 }
 
 window.open(`https://api.whatsapp.com/send?phone=${numero}&text=${encodeURIComponent(msg)}`,'_blank');
}

function atualizar(){
 if(!usuarioAtual) return;

 const mes=document.getElementById("mesSelect").value;
 let ganhos=0,gastos=0;
 let dias={};

 (data[usuarioAtual]||[]).forEach(l=>{
   const d=new Date(l.data);
   const chave=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");

   if(chave!==mes) return;

   const dia=String(d.getDate()).padStart(2,"0");

   if(!dias[dia]) dias[dia]=0;

   if(l.tipo==="vale"){
      gastos+=Number(l.valor);
      dias[dia]-=Number(l.valor);
   }else{
      ganhos+=Number(l.valor);
      dias[dia]+=Number(l.valor);
   }
 });

 const taxa=ganhos*(taxaSistema/100);
 const saldo=ganhos-gastos-taxa;

 document.getElementById("ganhos").innerText="R$ "+ganhos.toFixed(2);
 document.getElementById("gastos").innerText="R$ "+gastos.toFixed(2);
 document.getElementById("taxa").innerText="R$ "+taxa.toFixed(2);
 document.getElementById("saldo").innerText="R$ "+saldo.toFixed(2);

 const labels=Object.keys(dias).sort();
 const valores=labels.map(x=>dias[x]);

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("grafico"),{
   type:document.getElementById("tipoGrafico")?.value || "line",
   data:{
     labels:labels,
     datasets:[{
       label:"Movimentação diária",
       data:valores,
       borderWidth:3
     }]
   },
   options:{responsive:true}
 });
}

calcularGeral();
gerarRanking();
carregarUsuarios();
carregarMeses();

const primeiro = Object.keys(data)[0];
if(primeiro){
 usuarioAtual=primeiro;
 document.querySelector(".item")?.classList.add("active");
 atualizar();
}
</script>

</body>
</html>
