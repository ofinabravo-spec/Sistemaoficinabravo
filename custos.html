<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custo Geral</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f2f5;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    margin-bottom: 20px;
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.btn-add { background:#16a34a; color:white; width:100%; padding:12px; margin-top:5px; }
.btn-voltar { background:#374151; color:white; display:block; text-align:center; text-decoration:none; width:100%; padding:12px; margin-bottom:20px; border-radius:6px; }

.total-box{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#dc2626;
    text-align:right;
}

.lista{
    margin-top:20px;
}

.item{
    background:#f9fafb;
    padding:15px;
    border-radius:6px;
    margin-bottom:10px;
    border-left:4px solid #dc2626;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.info strong{ font-size:16px; }
.info small{ color:#6b7280; }
.info .valor { display:block; color:#dc2626; font-weight:bold; margin-top:4px; }

.btn-del{ background:#dc2626; color:white; padding:6px 12px; font-size:12px; }
.loading { text-align: center; color: #666; font-style: italic; padding: 10px; }
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="btn-voltar">⬅️ Voltar ao Dashboard</a>

<div class="card">
    <h1>💸 Custos e Despesas Gerais</h1>
    <input id="descricao" placeholder="Descrição do gasto (ex: Aluguel, Peças...)">
    <input id="valor" type="number" step="0.01" placeholder="Valor (R$)">
    <button class="btn-add" onclick="adicionarCusto()">➕ Adicionar Saída</button>
</div>

<div class="card">
    <h2>📋 Histórico de Despesas (Nuvem)</h2>
    <div id="listaCustos">
        <p class="loading">Buscando lançamentos...</p>
    </div>
    <div class="total-box" id="totalGeral">Total: R$ 0,00</div>
</div>

</div>

<script>
// Conexão apontando para a aba 'custos' da sua planilha
const API_URL = "https://sheetdb.io/api/v1/550s3xju33qqi?sheet=custos";
let custos = [];

function carregarCustos() {
    document.getElementById("listaCustos").innerHTML = '<p class="loading">Atualizando valores...</p>';
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            custos = data.map(item => ({
                descricao: item.descricao || "",
                valor: parseFloat(item.valor) || 0,
                data: item.data || ""
            }));
            atualizarTela();
        })
        .catch(err => {
            console.error(err);
            document.getElementById("listaCustos").innerHTML = '<p class="loading" style="color:red;">Erro ao atualizar despesas.</p>';
        });
}

function adicionarCusto() {
    const descricao = document.getElementById("descricao").value.trim();
    const valor = parseFloat(document.getElementById("valor").value);

    if(!descricao || !valor) {
        alert("Preencha a descrição e o valor corretamente.");
        return;
    }

    const novoCusto = {
        descricao: descricao,
        valor: valor,
        data: new Date().toLocaleString("pt-BR")
    };

    fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: [novoCusto] })
    })
    .then(res => res.json())
    .then(() => {
        document.getElementById("descricao").value = "";
        document.getElementById("valor").value = "";
        carregarCustos();
    })
    .catch(err => alert("Erro ao salvar custo: " + err));
}

function excluirCusto(index) {
    if(confirm("Excluir definitivamente esta despesa?")) {
        const descCusto = custos[index].descricao;
        document.getElementById("listaCustos").innerHTML = '<p class="loading">Removendo da nuvem...</p>';
        
        // Deleta filtrando pela descrição
        fetch(`${API_URL}&descricao=${descCusto}`, { method: 'DELETE' })
            .then(() => {
                alert("Custo removido!");
                carregarCustos();
            })
            .catch(err => alert("Erro ao deletar: " + err));
    }
}

function atualizarTela() {
    let html = "";
    let total = 0;

    custos.forEach((item, index) => {
        total += item.valor;
        html += `
        <div class="item">
            <div class="info">
                <strong>${item.descricao}</strong><br>
                <small>📅 ${item.data}</small><br>
                <span class="valor">${moeda(item.valor)}</span>
            </div>
            <button class="btn-del" onclick="excluirCusto(${index})">Excluir</button>
        </div>`;
    });

    document.getElementById("listaCustos").innerHTML = html || "<p class='loading'>Nenhum custo registrado.</p>";
    document.getElementById("totalGeral").innerText = "Total: " + moeda(total);
}

function moeda(v) {
    return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

// Inicializa puxando do Google Sheets
carregarCustos();
</script>

</body>
</html>
