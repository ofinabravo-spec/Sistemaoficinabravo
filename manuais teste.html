<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoDrive | Catálogo de Motos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --card-bg: #1e293b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: 260px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 10;
        }

        .logo {
            padding: 24px;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .nav-links {
            list-style: none;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--accent);
        }

        /* Novo Botão Voltar Estilizado */
        .nav-links a.btn-back {
            margin-top: 10px;
            border: 1px solid var(--border);
            background-color: rgba(255, 255, 255, 0.02);
        }

        .nav-links a.btn-back:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        /* Main Content */
        main {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
            max-width: 1400px;
            width: calc(100% - 260px);
        }

        /* Dashboard Counter Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            font-size: 32px;
            color: var(--accent);
            background: rgba(245, 158, 11, 0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .stat-info h3 {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-info p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Centro de Pesquisa */
        .search-section {
            margin-bottom: 40px;
            max-width: 800px;
        }

        .search-container {
            position: relative;
            margin-bottom: 15px;
        }

        .search-bar {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-bar:focus {
            border-color: var(--accent);
        }

        .search-container i.search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }

        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background: rgba(245, 158, 11, 0.1);
        }

        .quick-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .tag-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(245, 158, 11, 0.05);
        }

        .tag-btn.active-tag {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            font-weight: 600;
        }

        /* Seção do Catálogo */
        .section-title {
            font-size: 22px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .moto-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .moto-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .moto-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #0b0f19;
        }

        .moto-content {
            padding: 20px;
        }

        .moto-brand {
            color: var(--accent);
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .moto-title {
            font-size: 19px;
            margin: 5px 0 12px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .moto-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            text-align: center;
            font-size: 13px;
            background: var(--accent);
            color: var(--bg-primary);
            text-decoration: none;
        }

        .btn:hover { background: var(--accent-hover); }

        /* JANELA FLUTUANTE ARRASTÁVEL */
        .window-popup {
            position: fixed;
            top: 8%;
            left: 30%;
            width: 1050px;
            height: 680px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 2px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            z-index: 9999;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .window-header {
            padding: 14px 20px;
            background: #111827;
            color: var(--text-main);
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            border-bottom: 1px solid var(--border);
        }

        .window-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-close {
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .window-close:hover {
            color: var(--danger);
        }

        .window-body {
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 49px);
            background: #fff;
        }

        .pdf-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo">
            <i class="fa-solid fa-motorcycle"></i> MotoDrive
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active"><i class="fa-solid fa-magnifying-glass"></i> Pesquisa Inteligente</a></li>
            <li><a href="javascript:history.back()" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Voltar</a></li>
        </ul>
    </aside>

    <main>
        <div class="dashboard-grid">
            <div class="stat-card">
                <i class="fa-solid fa-motorcycle stat-icon"></i>
                <div class="stat-info"><h3 id="count-motos">0</h3><p>Modelos Exibidos</p></div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-industry stat-icon"></i>
                <div class="stat-info"><h3 id="count-marcas">0</h3><p>Marcas Filtradas</p></div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-calendar stat-icon"></i>
                <div class="stat-info"><h3>2026</h3><p>Último Ano Cadastrado</p></div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" class="search-bar" id="search-input" placeholder="Digite uma marca, modelo, cilindrada ou categoria (ex: Honda, Naked, 1000 cc)...">
                <div class="autocomplete-suggestions" id="suggestions-box"></div>
            </div>
            <div class="quick-tags">
                <span style="color: var(--text-muted); font-size: 14px;"><i class="fa-solid fa-fire-flame-curved"></i> Sugestões:</span>
                <button class="tag-btn" onclick="quickSearch('Naked')">Naked</button>
                <button class="tag-btn" onclick="quickSearch('Big Trail')">Big Trail</button>
                <button class="tag-btn" onclick="quickSearch('Esportiva')">Esportivas</button>
                <button class="tag-btn" onclick="quickSearch('Honda')">Honda</button>
                <button class="tag-btn" onclick="quickSearch('Yamaha')">Yamaha</button>
                <button class="tag-btn" onclick="quickSearch('BMW')">BMW</button>
                <button class="tag-btn" onclick="clearSearch()" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: transparent;">Limpar Filtro</button>
            </div>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-fire"></i> Catálogo de Veículos e Manuais</h2>
        <div class="catalog-grid" id="catalog-container"></div>
    </main>

    <div id="my-window" class="window-popup">
        <div id="my-window-header" class="window-header">
            <span class="window-title" id="popup-title">
                <i class="fa-solid fa-file-pdf"></i> Visualizador de Manual
            </span>
            <i class="fa-solid fa-xmark window-close" onclick="closeWindow()"></i>
        </div>
        <div class="window-body">
            <iframe id="pdf-viewer" class="pdf-iframe" src=""></iframe>
        </div>
    </div>
   
    <script>
        // BANCO DE DADOS LOCAL
        const motosDB = [
            { 
                id: 1, 
                marca: "Honda", 
                modelo: "Biz 100cc", 
                ano: 2005, 
                categoria: "CUB", 
                motor: "100 cc", 
                potencia: "7,4 cv", 
                imagem: "fotos/Honda-C-100-Biz.webp", 
                manualPdf: "manuais%20de%20serviços/biz%20-100cc.pdf" 
            },
            { 
               
    id: 2, 
    marca: "Honda", 
    modelo: "Honda CG 160 titan ", 
    ano: "2018-2022", // Corrigido para texto entre aspas
    categoria: "Street / Urbana", 
    motor: "OHC, Monocilíndrico, 4 tempos, arrefecido a ar-Cilindrada 162,7 cc", 
    potencia: "14,9 cv (Gasolina) / 15,1 cv (Etanol) a 8.000 rpm", 
    imagem: "https://i.ytimg.com/vi/OuzSSyuu8Nk/sddefault.jpg", // <-- COLOQUE O NOME DA SUA IMAGEM AQUI (ex: .jpg ou .png)
    manualPdf: "manuais%20de%20serviços/160%20titan%20,%20star.pdf" 

            },
            { 
                id: 3, 
                marca: "Yamaha", 
                modelo: "MT-09", 
                ano: 2026, 
                categoria: "Naked", 
                motor: "847 cc", 
                potencia: "115 cv", 
                imagem: "https://images.unsplash.com/photo-1449426468159-d96dbf08f19f?w=500&q=80", 
                manualPdf: "manuais/mt09.pdf" 
            },
            { 
                id: 4, 
                marca: "BMW", 
                modelo: "R 1250 GS", 
                ano: 2025, 
                categoria: "Big Trail", 
                motor: "1254 cc", 
                potencia: "136 cv", 
                imagem: "https://images.unsplash.com/photo-1609630875171-b1321377ee65?w=500&q=80", 
                manualPdf: "manuais/r1250gs.pdf" 
            },
            { 
                id: 5, 
                marca: "BMW", 
                modelo: "S 1000 RR", 
                ano: 2026, 
                categoria: "Esportiva", 
                motor: "999 cc", 
                potencia: "210 cv", 
                imagem: "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?w=500&q=80", 
                manualPdf: "manuais/s1000rr.pdf" 
            }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            updateDashboard(motosDB);
            renderCatalog(motosDB);
            setupSearchEngine();
            makeElementDraggable(document.getElementById("my-window"));
        });

        function updateDashboard(filteredMotos) {
            document.getElementById('count-motos').innerText = filteredMotos.length;
            const marcasUnicas = [...new Set(filteredMotos.map(m => m.marca))].length;
            document.getElementById('count-marcas').innerText = marcasUnicas;
        }

        function renderCatalog(motos) {
            const container = document.getElementById('catalog-container');
            container.innerHTML = '';

            if (motos.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; color: var(--text-muted); text-align: center; padding: 20px;">Nenhuma moto corresponde aos filtros aplicados.</p>`;
                return;
            }

            motos.forEach(moto => {
                const card = document.createElement('div');
                card.className = 'moto-card';
                card.innerHTML = `
                    <img src="${moto.imagem}" alt="${moto.modelo}" class="moto-img" onerror="this.src='https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=500&q=80';">
                    <div class="moto-content">
                        <span class="moto-brand">${moto.marca}</span>
                        <h3 class="moto-title">${moto.modelo}</h3>
                        <div class="moto-specs">
                            <span><i class="fa-solid fa-gauge"></i> ${moto.motor}</span>
                            <span><i class="fa-solid fa-bolt"></i> ${moto.potencia}</span>
                            <span><i class="fa-solid fa-tag"></i> ${moto.categoria}</span>
                            <span><i class="fa-solid fa-calendar"></i> ${moto.ano}</span>
                        </div>
                        <button class="btn" onclick="openPdfWindow('${moto.manualPdf}', '${moto.marca} ${moto.modelo}')">
                            <i class="fa-solid fa-file-pdf"></i> Abrir Manual PDF
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function setupSearchEngine() {
            const searchInput = document.getElementById('search-input');
            const suggestionsBox = document.getElementById('suggestions-box');

            searchInput.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase().trim();
                resetTagButtons();

                if (!val) {
                    suggestionsBox.style.display = 'none';
                    renderCatalog(motosDB);
                    updateDashboard(motosDB);
                    return;
                }

                const filtered = motosDB.filter(m => {
                    return `${m.marca} ${m.modelo} ${m.categoria} ${m.motor} ${m.ano}`.toLowerCase().includes(val);
                });

                renderCatalog(filtered);
                updateDashboard(filtered);

                suggestionsBox.innerHTML = '';
                if (filtered.length > 0) {
                    suggestionsBox.style.display = 'block';
                    filtered.slice(0, 5).forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.style.display = 'flex';
                        div.style.justifyContent = 'space-between';
                        div.innerHTML = `
                            <span><strong style="color: var(--accent);">${m.marca}</strong> ${m.modelo}</span>
                            <span style="font-size: 11px; background: var(--border); padding: 2px 8px; border-radius: 10px;">${m.categoria}</span>
                        `;
                        div.onclick = () => {
                            searchInput.value = `${m.marca} ${m.modelo}`;
                            suggestionsBox.style.display = 'none';
                            const motoFinal = motosDB.find(moto => moto.id === m.id);
                            renderCatalog([motoFinal]);
                            updateDashboard([motoFinal]);
                        };
                        suggestionsBox.appendChild(div);
                    });
                } else {
                    suggestionsBox.style.display = 'block';
                    suggestionsBox.innerHTML = `<div class="suggestion-item" style="color: var(--text-muted); text-align:center;">Nenhum modelo encontrado...</div>`;
                }
            });

            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target)) suggestionsBox.style.display = 'none';
            });
        }

        function quickSearch(termo) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = termo;
            resetTagButtons();

            document.querySelectorAll('.tag-btn').forEach(btn => {
                if (btn.innerText.toLowerCase().includes(termo.toLowerCase())) btn.classList.add('active-tag');
            });

            const val = termo.toLowerCase();
            const filtered = motosDB.filter(m => 
                m.categoria.toLowerCase().includes(val) || m.marca.toLowerCase().includes(val) || m.ano.toString().includes(val)
            );
            renderCatalog(filtered);
            updateDashboard(filtered);
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            resetTagButtons();
            renderCatalog(motosDB);
            updateDashboard(motosDB);
        }

        function resetTagButtons() {
            document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active-tag'));
        }

        /* CONTROLADORES DA JANELA DO MANUAL EM PDF */
        function openPdfWindow(pdfPath, motoNome) {
            document.getElementById('popup-title').innerHTML = `<i class="fa-solid fa-file-pdf"></i> Manual Técnico: ${motoNome}`;
            document.getElementById('pdf-viewer').src = pdfPath;
            // Correção realizada aqui (.style.display = 'flex')
            document.getElementById('my-window').style.display = 'flex';
        }

        function closeWindow() {
            document.getElementById('my-window').style.display = 'none';
            document.getElementById('pdf-viewer').src = '';
        }

        /* LÓGICA DE MOVIMENTAÇÃO ARRASTÁVEL */
        function makeElementDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const header = document.getElementById(elmnt.id + "-header");
            
            if (header) {
                header.onmousedown = dragMouseDown;
            } else {
                elmnt.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e = e || window.event;
                if(e.target.className === "window-close" || e.target.id === "pdf-viewer") return;
                
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
    </script>
</body>
</html>
